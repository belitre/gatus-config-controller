{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gatus-config-controller.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "gatus-config-controller.labels" . | nindent 4 }}
rules:
  {{- if or (eq .Values.leaderElection.resourceLock "leases") (eq .Values.leaderElection.resourceLock "configmapsleases") }}
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  {{- if or (eq .Values.leaderElection.resourceLock "configmaps") (eq .Values.leaderElection.resourceLock "configmapsleases") }}
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  {{- end }}
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
