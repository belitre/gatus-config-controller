apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "gatus-config-controller.fullname" . }}
  namespace: {{ .Values.configMapNamespace | default .Release.Namespace }}
  labels:
    {{- include "gatus-config-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update"]
