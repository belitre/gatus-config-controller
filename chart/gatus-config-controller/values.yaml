image:
  repository: ghcr.io/belitre/gatus-config-controller
  tag: canary
  pullPolicy: IfNotPresent

# Number of controller replicas. Set to >1 together with leaderElection.enabled=true for HA.
replicaCount: 1

# Log level: debug, info, error (default: info)
logLevel: ""

# Leader election — required when running more than one replica.
# resourceLock: "leases" (default, uses coordination.k8s.io/Lease) or
#               "configmaps" (uses core/v1 ConfigMap in the release namespace)
leaderElection:
  enabled: false
  id: gatus-config-controller
  resourceLock: leases

# Namespace and name of the ConfigMap written by the controller.
# configMapNamespace defaults to the release namespace when left empty.
configMapNamespace: ""
configMapName: gatus-dynamic-config

# Enable watching HTTPRoute resources (gateway.networking.k8s.io/v1).
# Requires the Gateway API CRDs to be installed in the cluster.
# If enabled and the CRDs are not present the controller will fail to start.
# When enabled, config.httpRoutes follows the same nil/empty/list semantics as config.ingresses.
watchHTTPRoutes: false

# Controller config — ingress selection and check templates.
#
# INGRESS SELECTION (config.ingresses)
# ─────────────────────────────────────
# The key distinction is nil vs. empty:
#
#   config: {}                  ← ingresses key absent → select ALL ingresses
#   config:
#     ingresses: []             ← empty list → select NO ingresses
#   config:
#     ingresses: [...]          ← one or more selectors → select matching ingresses
#
# Selectors are ORed: an ingress is selected if it matches ANY selector.
# Within a selector, all filters are ANDed.
#
# Available filters per selector:
#   namespaces:
#     include: [default, production]   # must be in this list
#     exclude: [kube-system]           # must not be in this list
#   ingressClasses:
#     include: [nginx]
#     exclude: [internal]
#   labels:
#     include:
#       - key: env
#         value: prod                  # all include pairs must be present
#     exclude:
#       - key: visibility
#         value: internal              # none of the exclude pairs may match
#   annotations:
#     include: [...]
#     exclude: [...]
#
# HTTPROUTE SELECTION (config.httpRoutes) — only used when watchHTTPRoutes=true
# ─────────────────────────────────────────────────────────────────────────────
# Same nil/empty/list semantics as config.ingresses (no ingressClasses filter):
#
#   config: {}                  ← httpRoutes key absent → select ALL HTTPRoutes
#   config:
#     httpRoutes: []            ← empty list → select NO HTTPRoutes
#   config:
#     httpRoutes: [...]         ← one or more selectors → select matching HTTPRoutes
#
# Available filters per selector: namespaces, labels, annotations (same as ingresses).
#
# CHECK TEMPLATES (config.defaultChecks / selector.checks)
# ─────────────────────────────────────────────────────────
# Controls what Gatus checks are generated per host.
# Priority: selector.checks > config.defaultChecks > builtin (single HTTPS check).
#
# Each template produces one Gatus endpoint per host:
#   nameSuffix: http-redirect          # appended to endpoint name: "ns/name - http-redirect"
#   scheme: http                       # "http" or "https" — sets the URL scheme
#   interval: 60s
#   noFollowRedirects: true            # sets client.ignore-redirect: true in Gatus
#   conditions:
#     - "[STATUS] == 301"
#     - "[RESPONSE_HEADER.Location] == *example.com*"   # glob match
#
# If nameSuffix is empty, the endpoint name is just "namespace/name".
#
config: {}

# Static Gatus endpoints written to the Gatus config ConfigMap as static.yaml.
# These are merged by Gatus alongside the dynamic endpoints the controller discovers.
staticConfig: {}

# Gatus subchart defaults — configures Gatus to read config from the shared ConfigMap.
gatus:
  fullnameOverride: gatus
  externalConfigMap: gatus-dynamic-config
  env:
    GATUS_CONFIG_PATH: /config
  ingress:
    enabled: true
    ingressClassName: nginx
    hosts:
      - gatus.local
